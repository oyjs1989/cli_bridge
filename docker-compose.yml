version: "3.8"

services:
  cli-bridge:
    build: .
    image: cli-bridge:latest
    container_name: cli-bridge
    restart: unless-stopped
    init: true

    volumes:
      # Mount config file (create config/config.json first)
      - ./config/config.json:/root/.cli-bridge/config.json:ro
      # Persistent data
      - iflow-auth:/root/.iflow           # iflow CLI login credentials
      - cli-bridge-data:/root/.cli-bridge   # bot workspace, sessions, memory

    environment:
      # Override config via environment variables (Pydantic-Settings)
      - CLI_BRIDGE__LOG_LEVEL=INFO
      # - CLI_BRIDGE__CHANNELS__TELEGRAM__TOKEN=your_token
      # - CLI_BRIDGE__CHANNELS__TELEGRAM__ENABLED=true
      # - CLI_BRIDGE__CHANNELS__FEISHU__ENABLED=true
      # - CLI_BRIDGE__CHANNELS__FEISHU__APP_ID=cli_xxx
      # - CLI_BRIDGE__CHANNELS__FEISHU__APP_SECRET=xxx

    # Only needed for ACP mode or webhook-based channels
    # ports:
    #   - "8090:8090"

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  iflow-auth:
  cli-bridge-data:
